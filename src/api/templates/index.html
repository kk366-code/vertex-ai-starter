    document.body.addEventListener('htmx:configRequest', async (event) => {
        const form = event.detail.elt;
        const fileInput = document.querySelector('input[name="file"]');
        const hasFiles = fileInput && fileInput.files && fileInput.files.length > 0;

        // フォームIDのチェック（elt を使用）
        if (form.id === 'upload-form' && hasFiles) {
            console.log("イベント発火2！圧縮を開始します。");

            // 【重要】htmx 1.x でリクエストを一時停止する正しい方法
            // async/await を使う場合、一旦イベントをキャンセルし、
            // 圧縮後に改めて htmx.trigger でリクエストを叩き直すのが確実です。

            const imageFile = fileInput.files[0];

            // すでに圧縮済みのファイルならスキップ（無限ループ防止）
            if (imageFile.name === "resized_photo.jpg") return;

            event.preventDefault(); // 元のリクエストを止める

            const options = {
                maxSizeMB: 0.8,
                maxWidthOrHeight: 1600,
                useWebWorker: true
            };

            try {
                console.log(`元サイズ: ${(imageFile.size / 1024 / 1024).toFixed(2)} MB`);
                const compressedFile = await imageCompression(imageFile, options);
                console.log(`圧縮完了: ${(compressedFile.size / 1024 / 1024).toFixed(2)} MB`);

                // 1. inputの中身を圧縮後のファイルに物理的に差し替える
                const dataTransfer = new DataTransfer();
                const newFile = new File([compressedFile], "resized_photo.jpg", { type: compressedFile.type });
                dataTransfer.items.add(newFile);
                fileInput.files = dataTransfer.files;

                // 2. フォームを再送信する
                // この時、上の resized_photo.jpg 判定で無限ループを防ぐ
                htmx.trigger(form, 'submit');

            } catch (error) {
                console.error("圧縮失敗:", error);
                // 失敗した場合はそのまま送る
                htmx.trigger(form, 'submit');
            }
        }
    });
