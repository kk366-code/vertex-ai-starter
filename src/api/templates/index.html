<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>AI写真解析</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-slate-50 min-h-screen p-4 flex flex-col items-center">
    <div class="max-w-md mx-auto p-6">
      <h1 class="text-xl font-bold mb-6 text-center">📸 写真解析</h1>

      <form
        hx-post="/upload"
        hx-encoding="multipart/form-data"
        hx-target="#result"
        hx-indicator="#loading"
        hx-disabled-elt="#submit-button"
        id="upload-form"
        class="flex flex-col items-center w-full"
      >
        <label
          for="file-input"
          class="flex flex-col items-center justify-center w-full p-8 border-4 border-dashed border-blue-200 rounded-2xl bg-white hover:bg-blue-50 cursor-pointer transition-all active:scale-95 shadow-inner"
        >
          <div
            class="text-5xl mb-3"
            id="upload-icon"
          >
            📸
          </div>
          <span
            class="text-xl text-blue-800 font-bold"
            id="upload-text"
          >
            写真を撮って解析
          </span>
          <p
            class="text-xs text-blue-400 mt-2"
            id="upload-desc"
          >
            スマホならカメラが起動します
          </p>
        </label>

        <input
          type="file"
          name="file"
          id="file-input"
          accept="image/*"
          onchange="previewImage(this)"
          class="sr-only"
        />

        <div
          id="preview-container"
          class="mt-4 hidden"
        >
          <p class="text-xs text-gray-400 mb-1 text-center">選択中の画像:</p>
          <img
            id="image-preview"
            src=""
            class="w-full h-auto rounded-lg shadow-md border border-gray-200"
          />
        </div>

        <button
          type="submit"
          id="submit-button"
          class="mt-4 w-full bg-blue-600 text-white py-2 rounded-lg font-bold disabled:bg-gray-400 disabled:cursor-not-allowed hidden"
        >
          解析を実行
        </button>
      </form>

      <div
        id="loading"
        class="htmx-indicator mt-4 text-center text-blue-600"
      >
        画像を圧縮・アップロード中...
      </div>

      <div
        id="result"
        class="mt-6"
      ></div>
    </div>
    <div
      id="toast-container"
      class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"
    ></div>
  </body>
</html>

<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.min.js"></script>

<script>
  document.body.addEventListener("htmx:configRequest", async (event) => {
    const form = event.detail.elt;
    const fileInput = document.querySelector('input[name="file"]');
    const hasFiles = fileInput && fileInput.files && fileInput.files.length > 0;

    if (form.id === "upload-form" && hasFiles) {
      const imageFile = fileInput.files[0];

      // 【無限ループ防止】
      // 既に一度このスクリプトで処理（圧縮）済みの場合はスキップ
      // 判定用のカスタム属性を付与してチェックします
      if (fileInput.dataset.compressed === "true") {
        delete fileInput.dataset.compressed; // 次回のためにリセット
        return;
      }

      event.preventDefault(); // 元のリクエストを一時停止

      const options = {
        maxSizeMB: 0.8,
        maxWidthOrHeight: 1600,
        useWebWorker: true,
      };

      try {
        console.log(`圧縮前: ${imageFile.name} (${(imageFile.size / 1024 / 1024).toFixed(2)} MB)`);

        const compressedBlob = await imageCompression(imageFile, options);

        // 1. 新しい File オブジェクトを作成
        // 第2引数に imageFile.name を渡すことで、元のファイル名をバックエンドに送ります
        const resizedFile = new File([compressedBlob], imageFile.name, {
          type: imageFile.type,
          lastModified: Date.now(),
        });

        // 2. input の内容を差し替え
        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(resizedFile);
        fileInput.files = dataTransfer.files;

        // 3. 再送信フラグを立てて実行
        fileInput.dataset.compressed = "true";
        htmx.trigger(form, "submit");

        console.log(
          `圧縮後: ${resizedFile.name} (${(resizedFile.size / 1024 / 1024).toFixed(2)} MB)`,
        );
      } catch (error) {
        console.error("圧縮失敗:", error);
        fileInput.dataset.compressed = "true";
        htmx.trigger(form, "submit");
      }
    }
  });

  function previewImage(input) {
    const container = document.getElementById("preview-container");
    const preview = document.getElementById("image-preview");
    const submitButton = document.getElementById("submit-button");

    if (input.files && input.files[0]) {
      const reader = new FileReader();

      reader.onload = function (e) {
        // 画像のデータURLをセットして表示
        preview.src = e.target.result;
        container.classList.remove("hidden"); // hiddenクラスを取って表示
        submitButton.classList.remove("hidden"); // 解析ボタンを表示
      };

      reader.readAsDataURL(input.files[0]);
    } else {
      // ファイルが選択解除されたら隠す
      container.classList.add("hidden");
      submitButton.classList.add("hidden"); // 解析ボタンも隠す
    }
  }

  // トーストを表示する共通関数
  function showToast(message, type = "success") {
    const container = document.getElementById("toast-container");
    const toast = document.createElement("div");

    // スタイル設定（成功時は緑、失敗時は赤）
    const bgColor = type === "success" ? "bg-green-600" : "bg-red-600";

    toast.className = `${bgColor} text-white px-6 py-3 rounded-lg shadow-lg transform transition-all duration-500 translate-y-10 opacity-0`;
    toast.innerText = message;

    container.appendChild(toast);

    // アニメーション：表示（ちょっと遅らせて実行することでふわっと出す）
    setTimeout(() => {
      toast.classList.remove("translate-y-10", "opacity-0");
    }, 100);

    // 3秒後に消す
    setTimeout(() => {
      toast.classList.add("opacity-0", "translate-y-[-10px]");
      setTimeout(() => toast.remove(), 500);
    }, 3000);
  }

  // HTMXの処理が終わったタイミングでトーストを出す
  document.body.addEventListener("htmx:afterRequest", (event) => {
    if (event.detail.target.id === "result") {
      if (event.detail.successful) {
        showToast("解析が完了しました！ ✨");
        document.getElementById("submit-button").classList.add("hidden"); // 解析が完了したらボタンを隠す
      } else {
        showToast("エラーが発生しました。", "error");
      }
    }
  });

  // デバイス判定ロジック
  document.addEventListener("DOMContentLoaded", () => {
    const fileInput = document.getElementById("file-input");
    const uploadIcon = document.getElementById("upload-icon");
    const uploadText = document.getElementById("upload-text");
    const uploadDesc = document.getElementById("upload-desc");

    // モバイル判定
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
      // スマホ向け設定
      fileInput.setAttribute("capture", "environment");
      uploadIcon.innerText = "📸";
      uploadText.innerText = "写真を撮って解析";
      uploadDesc.innerText = "カメラが起動します";
    } else {
      // PC向け設定
      fileInput.removeAttribute("capture");
      uploadIcon.innerText = "📁";
      uploadText.innerText = "画像を選択して解析";
      uploadDesc.innerText = "クリックしてファイルを選択";
    }
  });
</script>
