<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI写真解析</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen p-4 flex flex-col items-center">
    <div class="max-w-md mx-auto p-6">
        <h1 class="text-xl font-bold mb-6 text-center">📸 スマホ写真解析</h1>

        <form hx-post="/upload" hx-encoding="multipart/form-data" hx-target="#result" hx-indicator="#loading"
            id="upload-form">

            <input type="file" name="file" accept="image/*" capture="environment"
                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">

            <button type="submit" class="mt-4 w-full bg-blue-600 text-white py-2 rounded-lg font-bold">
                解析を実行
            </button>
        </form>

        <div id="loading" class="htmx-indicator mt-4 text-center text-blue-600">
            画像を圧縮・アップロード中...
        </div>

        <div id="result" class="mt-6"></div>
    </div>
</body>

</html>


<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.min.js">
</script>

<script>
    document.body.addEventListener('htmx:configRequest', async (event) => {
        const form = event.detail.elt;
        const fileInput = document.querySelector('input[name="file"]');
        const hasFiles = fileInput && fileInput.files && fileInput.files.length > 0;

        if (form.id === 'upload-form' && hasFiles) {
            const imageFile = fileInput.files[0];

            // 【無限ループ防止】 
            // 既に一度このスクリプトで処理（圧縮）済みの場合はスキップ
            // 判定用のカスタム属性を付与してチェックします
            if (fileInput.dataset.compressed === "true") {
                delete fileInput.dataset.compressed; // 次回のためにリセット
                return;
            }

            event.preventDefault(); // 元のリクエストを一時停止

            const options = {
                maxSizeMB: 0.8,
                maxWidthOrHeight: 1600,
                useWebWorker: true
            };

            try {
                console.log(`圧縮前: ${imageFile.name} (${(imageFile.size / 1024 / 1024).toFixed(2)} MB)`);

                const compressedBlob = await imageCompression(imageFile, options);

                // 1. 新しい File オブジェクトを作成
                // 第2引数に imageFile.name を渡すことで、元のファイル名をバックエンドに送ります
                const resizedFile = new File([compressedBlob], imageFile.name, {
                    type: imageFile.type,
                    lastModified: Date.now()
                });

                // 2. input の内容を差し替え
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(resizedFile);
                fileInput.files = dataTransfer.files;

                // 3. 再送信フラグを立てて実行
                fileInput.dataset.compressed = "true";
                htmx.trigger(form, 'submit');

                console.log(`圧縮後: ${resizedFile.name} (${(resizedFile.size / 1024 / 1024).toFixed(2)} MB)`);

            } catch (error) {
                console.error("圧縮失敗:", error);
                fileInput.dataset.compressed = "true";
                htmx.trigger(form, 'submit');
            }
        }
    });
</script>
